<script>
document.addEventListener('DOMContentLoaded', function() {
  // Initialize mini map centered on Glen Canyon Dam area
  var damCenter = [36.93, -111.48];
  var miniMap = L.map('nav-mini-map', {
    center: damCenter,
    zoom: 10,
    zoomControl: false,
    dragging: false,
    touchZoom: false,
    scrollWheelZoom: false,
    doubleClickZoom: false,
    boxZoom: false,
    keyboard: false
  });

  // Add tile layer
  L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
    attribution: 'Tiles &copy; Esri'
  }).addTo(miniMap);

  // Add Lake Powell Boundary
  L.esri.featureLayer({
    url: 'https://services.arcgis.com/cJ9YHowT8TU7DUyn/arcgis/rest/services/LakePowellBoundary/FeatureServer/0',
    style: function () {
      return { color: '#0066cc', weight: 2, fillOpacity: 0.3 };
    }
  }).addTo(miniMap);

  // Add dam marker
  L.marker(damCenter).addTo(miniMap)
    .bindPopup('Glen Canyon Dam');
});
</script>

<script>
// Randomize collection thumbnails from metadata.json and link each to its item page
document.addEventListener('DOMContentLoaded', function() {
  var thumbLinks = document.querySelectorAll('.collection-thumb-link');
  if (!thumbLinks.length) return;

  fetch('{{ "/assets/data/metadata.json" | relative_url }}')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      // Filter to items that have a thumbnail image
      var items = data.objects.filter(function(o) { return o.image_thumb; });
      if (items.length < 1) return;

      // Fisher-Yates shuffle, then take first 4
      for (var i = items.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var tmp = items[i]; items[i] = items[j]; items[j] = tmp;
      }
      var selected = items.slice(0, thumbLinks.length);

      thumbLinks.forEach(function(link, i) {
        var item = selected[i];
        if (!item) return;
        link.href = item.reference_url;
        var img = link.querySelector('img');
        if (img) {
          img.src = item.image_thumb;
          img.alt = item.title || 'Collection item';
        }
      });
    })
    .catch(function() {}); // silent fail — browse all link still works
});
</script>
