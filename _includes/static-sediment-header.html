<header class="static-sediment-header">
    <div class="static-header-content">
        <!-- Navigation Toggle - Left Side -->
        <div class="static-header-nav">
            {% include side-nav-banner.html %}
        </div>

        <!-- Site Title Image - Right Side -->
        <div class="static-sediment-title-container">
            <a href="{{ '/main.html' | relative_url }}" class="static-title-link">
                <img src="{{ '/assets/img/sedimentation-title.png' | relative_url }}"
                     alt="SEDIMENTATION"
                     class="tributary-title-img">
            </a>
        </div>
    </div>
</header>

<style>
.static-sediment-header {
    position: static !important; /* Force static positioning - scrolls with page */
    width: 100%;
    padding: 20px 40px;
    background: #f8f6f0;
    overflow: visible;
    border-bottom: 1px solid ridge #a65912;
    /* No fixed/sticky positioning - flows with page content */
}

.static-header-content {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    max-width: 100%;
}

.static-header-nav {
    flex-shrink: 0;
    z-index: 20;
}

.static-sediment-title-container {
    flex: 1;
    display: flex;
    justify-content: flex-end;
    padding-right: 0;
}

.static-title-link {
    display: inline-block;
    transition: all 0.3s ease;
}

.static-title-link:hover {
    transform: translateY(-2px);
    filter: brightness(1.05);
}

.static-sediment-title-img {
    height: 83px;
    width: auto;
    max-width: 100%;
    display: block;
}

/* Responsive adjustments */
@media (max-width: 768px) {
    .static-sediment-header {
        padding: 15px 20px;
    }

   

}

@media (max-width: 480px) {
    .static-sediment-header {
        padding: 10px 10px 10px 5px;
    }

    
}

</style>
