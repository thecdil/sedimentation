<script>
/**
 * EDDIES — CHOOSE YOUR OWN ADVENTURE SYSTEM
 * ==========================================
 * Creates an endless, randomized journey through sections drawn from the
 * tributary essays, presented one section at a time with sediment particle
 * coalesce animations between each reveal.
 *
 * DATA FLOW:
 *   /assets/data/tributaries.json → tributariesData (all tributaries/sections)
 *   → allSections (flat array, filtered via shouldIncludeSection)
 *   → Each displayed section drawn from allSections and appended to #eddies-sections
 *
 * STATE MANAGEMENT — two separate stores:
 *   localStorage ('eddies-viewed-sections'):  Cross-session set of viewed section keys
 *     (tributary:sectionId). Resets automatically when all sections have been seen.
 *   sessionStorage ('eddies-loaded-sections', 'eddies-session-active'):  The ordered
 *     list of sections loaded in the current tab session, enabling page-refresh restore
 *     without re-animating. Cleared on user-triggered reset.
 *
 * NAVIGATION — two choices appear at the bottom of each section:
 *   1. RANDOMIZE button: calls getRandomSection() to pick a random unviewed section
 *      from allSections (any tributary). Falls back to full reset when all are viewed.
 *   2. CURATED button: follows the original trib-button link embedded in the source
 *      content (extractTribButtonTarget). If the content linked to another tributary
 *      section, this button loads that specific section. If no link found, opens a
 *      section-picker modal for the current tributary.
 *
 * PARTICLE COALESCE ANIMATION (animateSectionAppearance):
 *   When a new section loads, 200 SedimentParticle instances start at random viewport
 *   positions and fly toward the bounding box of the new section element over 1200ms.
 *   The section content fades in as the particles arrive (opacity starts at 40% of
 *   animation progress). A full-viewport fixed canvas (#cyoa-particle-canvas) is
 *   created for the animation and removed when complete.
 *   Disabled when prefers-reduced-motion is set.
 *
 * CONTENT PROCESSING (processContentForCYOA):
 *   The raw HTML content from tributaries.json is sanitized before display:
 *   - Existing tributary navigation elements (.trib-choice-container, .new-section)
 *     are removed (CYOA supplies its own navigation)
 *   - Images are wrapped in Spotlight-compatible <a class="spotlight"> anchors
 *     so the gallery viewer works within the CYOA context
 */

(function() {
  'use strict';

  // Sediment particle colors
  const PARTICLE_COLORS = ['#CD853F', '#D2691E', '#F4A460', '#DEB887', '#BC8F8F', '#A0522D'];

  // Animation configuration
  const ANIMATION_CONFIG = {
    duration: 1200,           // Total animation time
    particleCount: 200,       // Number of particles
    particleSize: { min: 1.5, max: 3.5 },
    coalesceSpeed: 0.08,      // How fast particles form content
    settleSpeed: 1.4          // Final settling multiplier
  };

  // Check for reduced motion preference
  const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  // State management
  let tributariesData = null;
  let allSections = [];
  let viewedSections = [];
  let isLoading = false;
  let loadedSections = []; // Track sections added to the page for session persistence

  /**
   * Particle class for sediment coalesce animation
   */
  class SedimentParticle {
    constructor(targetX, targetY, color, size) {
      // Start from random position
      this.startX = Math.random() * window.innerWidth;
      this.startY = Math.random() * window.innerHeight;
      this.x = this.startX;
      this.y = this.startY;

      this.targetX = targetX;
      this.targetY = targetY;

      this.color = color;
      this.size = size;
      this.opacity = 0;
      this.progress = 0;

      // Add slight randomness to movement
      this.delay = Math.random() * 0.3;
      this.speedVariance = 0.8 + Math.random() * 0.4;
    }

    update(globalProgress) {
      // Account for individual particle delay
      let adjustedProgress = Math.max(0, (globalProgress - this.delay) / (1 - this.delay));
      adjustedProgress = Math.min(1, adjustedProgress);

      // Ease-out cubic for smooth deceleration
      const eased = 1 - Math.pow(1 - adjustedProgress, 3);

      // Move toward target
      this.x = this.startX + (this.targetX - this.startX) * eased;
      this.y = this.startY + (this.targetY - this.startY) * eased;

      // Fade in as particles approach target
      this.opacity = Math.min(1, adjustedProgress * 1.5);

      this.progress = adjustedProgress;
    }

    draw(ctx) {
      if (this.opacity <= 0) return;

      ctx.globalAlpha = this.opacity;
      ctx.fillStyle = this.color;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }

    isComplete() {
      return this.progress >= 0.99;
    }
  }

  /**
   * Initialize the CYOA system
   */
  async function init() {
    // Load tributaries data using Jekyll's relative_url
    const tributariesUrl = '{{ "/assets/data/tributaries.json" | relative_url }}';

    try {
      const response = await fetch(tributariesUrl);
      if (!response.ok) {
        throw new Error(`HTTP error! status: ${response.status}`);
      }
      tributariesData = await response.json();

      // Flatten all sections into a single array, filtering out unwanted sections
      allSections = [];
      tributariesData.tributaries.forEach(trib => {
        trib.sections.forEach(section => {
          // Skip sections that shouldn't be included
          if (!shouldIncludeSection(section)) {
            return;
          }

          allSections.push({
            tributary: trib.title,
            tributarySlug: trib.slug,
            tributaryUrl: trib.url,
            heading: section.heading,
            id: section.id,
            html_content: section.html_content
          });
        });
      });

      // Load viewed sections from localStorage
      const stored = localStorage.getItem('eddies-viewed-sections');
      if (stored) {
        viewedSections = JSON.parse(stored);
        // Reset if all sections have been viewed
        if (viewedSections.length >= allSections.length) {
          viewedSections = [];
          localStorage.removeItem('eddies-viewed-sections');
        }
      }

      console.log(`Eddies CYOA initialized: ${allSections.length} sections available, ${viewedSections.length} already viewed`);

    } catch (error) {
      console.error('Failed to load tributaries data:', error);
      showError();
      return;
    }

    // Restore session if exists
    restoreSession();

    // Setup event listeners
    setupEventListeners();

    // Create control buttons if session is active
    if (sessionStorage.getItem('eddies-session-active') === 'true') {
      createControlButtons();
    }
  }

  /**
   * Setup initial event listeners
   */
  function setupEventListeners() {
    const beginBtn = document.getElementById('begin-journey-btn');
    if (beginBtn) {
      beginBtn.addEventListener('click', handleBeginJourney);
    }
  }

  /**
   * Handle "Begin Journey" button click
   */
  function handleBeginJourney() {
    const intro = document.getElementById('eddies-intro');
    if (intro) {
      intro.style.transition = 'opacity 400ms ease';
      intro.style.opacity = '0';
      setTimeout(() => {
        intro.style.display = 'none';
        loadRandomSection();
        // Mark session as active and create control buttons
        sessionStorage.setItem('eddies-session-active', 'true');
        createControlButtons();
      }, 400);
    }
  }

  /**
   * Create sticky control buttons (Reset and Print/Save)
   */
  function createControlButtons() {
    // Check if buttons already exist
    if (document.getElementById('eddies-controls')) return;

    const controls = document.createElement('div');
    controls.id = 'eddies-controls';
    controls.className = 'eddies-controls';
    controls.innerHTML = `
      <button id="eddies-reset-btn" class="btn btn-sm eddies-control-btn eddies-reset-btn" aria-label="Clear and reset">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
          <path fill-rule="evenodd" d="M8 3a5 5 0 1 0 4.546 2.914.5.5 0 0 1 .908-.417A6 6 0 1 1 8 2v1z"/>
          <path d="M8 4.466V.534a.25.25 0 0 1 .41-.192l2.36 1.966c.12.1.12.284 0 .384L8.41 4.658A.25.25 0 0 1 8 4.466z"/>
        </svg>
        <span>Clear & Reset</span>
      </button>
      <button id="eddies-print-btn" class="btn btn-sm eddies-control-btn eddies-print-btn" aria-label="Save or print as PDF">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
          <path d="M2.5 8a.5.5 0 1 0 0-1 .5.5 0 0 0 0 1z"/>
          <path d="M5 1a2 2 0 0 0-2 2v2H2a2 2 0 0 0-2 2v3a2 2 0 0 0 2 2h1v1a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2v-1h1a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-1V3a2 2 0 0 0-2-2H5zM4 3a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v2H4V3zm1 5a2 2 0 0 0-2 2v1H2a1 1 0 0 1-1-1V7a1 1 0 0 1 1-1h12a1 1 0 0 1 1 1v3a1 1 0 0 1-1 1h-1v-1a2 2 0 0 0-2-2H5zm7 2v3a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1v-3a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1z"/>
        </svg>
        <span>Save/Print</span>
      </button>
    `;

    document.body.appendChild(controls);

    // Setup button listeners
    document.getElementById('eddies-reset-btn').addEventListener('click', handleReset);
    document.getElementById('eddies-print-btn').addEventListener('click', handlePrint);

    // Setup scroll listener to collapse buttons after 1000px
    setupScrollCollapse();
  }

  /**
   * Setup scroll listener to collapse control buttons
   */
  function setupScrollCollapse() {
    let hasCollapsed = false;

    function handleScroll() {
      const scrollY = window.scrollY || window.pageYOffset;

      if (scrollY > 1000 && !hasCollapsed) {
        const controls = document.getElementById('eddies-controls');
        if (controls) {
          controls.classList.add('collapsed');
          hasCollapsed = true;
        }
      } else if (scrollY <= 1000 && hasCollapsed) {
        const controls = document.getElementById('eddies-controls');
        if (controls) {
          controls.classList.remove('collapsed');
          hasCollapsed = false;
        }
      }
    }

    window.addEventListener('scroll', handleScroll, { passive: true });
  }

  /**
   * Handle reset button click
   */
  function handleReset() {
    if (confirm('Are you sure you want to clear all content and reset? This will start your journey over.')) {
      // Clear session storage
      sessionStorage.removeItem('eddies-session-active');
      sessionStorage.removeItem('eddies-loaded-sections');

      // Clear the sections container
      const container = document.getElementById('eddies-sections');
      if (container) {
        container.innerHTML = '';
      }

      // Show intro again
      const intro = document.getElementById('eddies-intro');
      if (intro) {
        intro.style.display = 'block';
        intro.style.opacity = '0';
        setTimeout(() => {
          intro.style.opacity = '1';
        }, 10);
      }

      // Remove control buttons
      const controls = document.getElementById('eddies-controls');
      if (controls) {
        controls.remove();
      }

      // Reset loaded sections
      loadedSections = [];
    }
  }

  /**
   * Handle print/save button click.
   * Serializes the current session to localStorage so the print page
   * (a separate tab) can read it — sessionStorage doesn't cross tabs.
   */
  function handlePrint() {
    const sessionData = {
      sections: loadedSections,
      generatedAt: new Date().toISOString()
    };
    localStorage.setItem('eddies-print-session', JSON.stringify(sessionData));

    const fmt = localStorage.getItem('print-format') || 'letter';
    const printUrl = '{{ "/print/eddies/" | relative_url }}' + '?format=' + fmt;
    window.open(printUrl, '_blank', 'noopener');
  }

  /**
   * Save current session state.
   * Writes to sessionStorage (tab-local restore) AND to localStorage
   * so the print hub at /print/ can always show the current session state
   * without requiring the user to click the print button first.
   */
  function saveSession() {
    sessionStorage.setItem('eddies-loaded-sections', JSON.stringify(loadedSections));
    // Keep the print session in sync so /print/ hub reflects current state
    localStorage.setItem('eddies-print-session', JSON.stringify({
      sections: loadedSections,
      generatedAt: new Date().toISOString()
    }));
  }

  /**
   * Restore session from sessionStorage
   */
  function restoreSession() {
    const sessionActive = sessionStorage.getItem('eddies-session-active');
    const storedSections = sessionStorage.getItem('eddies-loaded-sections');

    if (sessionActive === 'true' && storedSections) {
      try {
        loadedSections = JSON.parse(storedSections);

        if (loadedSections.length > 0) {
          // Hide intro
          const intro = document.getElementById('eddies-intro');
          if (intro) {
            intro.style.display = 'none';
          }

          // Restore all sections without animation
          loadedSections.forEach(sectionData => {
            const section = allSections.find(s =>
              s.tributarySlug === sectionData.tributarySlug && s.id === sectionData.id
            );
            if (section) {
              loadSection(section, false); // No animation for restored sections
            }
          });

          console.log(`Session restored: ${loadedSections.length} sections loaded`);
        }
      } catch (error) {
        console.error('Failed to restore session:', error);
        sessionStorage.removeItem('eddies-loaded-sections');
      }
    }
  }

  /**
   * Get a random unviewed section
   */
  function getRandomSection() {
    // Filter out viewed sections
    const unviewed = allSections.filter(section => {
      const sectionKey = `${section.tributarySlug}:${section.id}`;
      return !viewedSections.includes(sectionKey);
    });

    // If all sections viewed, reset
    if (unviewed.length === 0) {
      viewedSections = [];
      localStorage.removeItem('eddies-viewed-sections');
      return allSections[Math.floor(Math.random() * allSections.length)];
    }

    // Return random unviewed section
    return unviewed[Math.floor(Math.random() * unviewed.length)];
  }

  /**
   * Mark a section as viewed
   */
  function markSectionViewed(section) {
    const sectionKey = `${section.tributarySlug}:${section.id}`;
    if (!viewedSections.includes(sectionKey)) {
      viewedSections.push(sectionKey);
      localStorage.setItem('eddies-viewed-sections', JSON.stringify(viewedSections));
    }
  }

  /**
   * Extract the target link from trib-button in HTML content
   * Returns { tributarySlug, anchorId } or null if no button found
   */
  function extractTribButtonTarget(htmlContent) {
    const temp = document.createElement('div');
    temp.innerHTML = htmlContent;

    // Look for trib-button link within the content
    // The button might be in a .choice-inner or have data-trib attribute
    const tribLink = temp.querySelector('a[href*="/tributaries/"]');

    if (tribLink) {
      const href = tribLink.getAttribute('href');
      // Parse href like "/tributaries/atmosphere/#wind-memories"
      const match = href.match(/\/tributaries\/([^\/]+)\/?(#(.+))?/);

      if (match) {
        return {
          tributarySlug: match[1],
          anchorId: match[3] || null
        };
      }
    }

    return null;
  }

  /**
   * Ensure Pannellum CSS and JS are loaded before initializing panorama viewers.
   * Safe to call multiple times — resolves immediately if already loaded.
   */
  function ensurePannellumLoaded() {
    return new Promise(function(resolve) {
      if (window.pannellum) { resolve(); return; }

      const link = document.createElement('link');
      link.rel = 'stylesheet';
      link.href = '{{ "/assets/lib/pannellum/pannellum.css" | relative_url }}';
      document.head.appendChild(link);

      const s = document.createElement('script');
      s.src = '{{ "/assets/lib/pannellum/pannellum.js" | relative_url }}';
      s.onload = resolve;
      s.onerror = resolve;
      document.head.appendChild(s);
    });
  }

  /**
   * Process HTML content to wrap images with Spotlight gallery markup,
   * remove original tributary navigation elements, rewrite footnote links
   * to open on the source tributary page, and extract Pannellum init scripts
   * so they can be re-executed after DOM insertion.
   */
  function processContentForCYOA(htmlContent, sectionId, tributaryUrl) {
    // Create a temporary div to parse HTML
    const temp = document.createElement('div');
    temp.innerHTML = htmlContent;

    // Extract the target link before removing navigation
    const targetLink = extractTribButtonTarget(htmlContent);

    // Remove all existing navigation elements from original tributary pages
    // These include: trib-choice-container, new-section divs, continue/branch buttons
    const navElements = temp.querySelectorAll('.trib-choice-container, .new-section');
    navElements.forEach(el => el.remove());

    // Also remove any standalone trib-button includes
    const tribButtons = temp.querySelectorAll('.trib-choice-button, .choice-inner');
    tribButtons.forEach(el => {
      // Only remove if they're not already inside a trib-choice-container (which we already removed)
      if (!el.closest('.trib-choice-container')) {
        el.remove();
      }
    });

    // Rewrite footnote links to point to the source tributary page.
    // Kramdown emits href="#fn:1" / href="#fnref:1" which don't exist on /eddies/.
    if (tributaryUrl) {
      temp.querySelectorAll('a[href^="#fn:"], a[href^="#fnref:"]').forEach(a => {
        a.setAttribute('href', tributaryUrl + a.getAttribute('href'));
        a.setAttribute('target', '_blank');
        a.setAttribute('rel', 'noopener');
      });
    }

    // Remove Pannellum library tags — they are inert via innerHTML and will be
    // loaded on demand by ensurePannellumLoaded() when needed.
    temp.querySelectorAll('link[href*="pannellum"], script[src*="pannellum"]').forEach(el => el.remove());

    // Extract inline Pannellum viewer init scripts. Scripts injected via innerHTML
    // are parsed as DOM nodes but never executed; we collect them here and execute
    // them explicitly after the section is in the live DOM.
    const panoramaScripts = [];
    temp.querySelectorAll('script:not([src])').forEach(script => {
      if (script.textContent.includes('pannellum.viewer(')) {
        panoramaScripts.push(script.textContent);
        script.remove();
      }
    });

    // Find all images and wrap them with Spotlight markup
    const images = temp.querySelectorAll('img');
    let imageIndex = 0;

    images.forEach(img => {
      // Skip if already wrapped with spotlight
      if (img.closest('.spotlight')) return;

      // Skip if this is a button image (trib-button-image)
      if (img.classList.contains('trib-button-image')) return;

      // Get image attributes
      const src = img.getAttribute('src');
      const alt = img.getAttribute('alt') || '';
      const title = img.getAttribute('title') || alt;

      // Create unique ID for this image
      const imageId = `eddy-${sectionId}-img-${imageIndex}`;
      imageIndex++;

      // Create spotlight wrapper. Each section gets a unique gallery class derived from
      // the compound sectionId (tributarySlug + section heading id). This scopes Spotlight's
      // native event-delegation gallery to the current section only — no cross-section leakage
      // and no stale state between sessions or after reset.
      const wrapper = document.createElement('a');
      wrapper.className = 'spotlight gallery-eddy-' + sectionId;
      wrapper.setAttribute('href', src);
      wrapper.setAttribute('title', title);
      wrapper.setAttribute('data-download', 'true');
      wrapper.setAttribute('data-eddy-image-id', imageId);

      // Add fullscreen hint
      const hint = document.createElement('div');
      hint.innerHTML = '<div class="visually-hidden">Click for full screen</div>';
      wrapper.appendChild(hint);

      // Wrap the image
      const parent = img.parentNode;
      parent.insertBefore(wrapper, img);
      wrapper.appendChild(img);
    });

    return {
      html: temp.innerHTML,
      targetLink: targetLink,
      panoramaScripts: panoramaScripts
    };
  }

  /**
   * Filter out sections that shouldn't be shown in CYOA
   * (Works Cited, sections without navigation buttons)
   */
  function shouldIncludeSection(section) {
    // Exclude "Works Cited" sections
    if (section.heading && section.heading.match(/works cited|references/i)) {
      return false;
    }

    // Exclude placeholder "Coming Soon!" sections
    if (section.html_content && section.html_content.indexOf('Coming Soon!') !== -1) {
      return false;
    }

    // Exclude sections with insufficient content (less than ~2 paragraphs)
    if (!section.html_content || section.html_content.trim().length < 250) {
      return false;
    }

    return true;
  }

  /**
   * Load and display a specific section
   */
  function loadSection(section, animate = true) {
    if (isLoading) return;
    isLoading = true;

    // Mark as viewed
    markSectionViewed(section);

    // Add to loaded sections for session persistence
    loadedSections.push({
      tributarySlug: section.tributarySlug,
      id: section.id
    });
    saveSession();

    // Create section container
    const container = document.getElementById('eddies-sections');
    const sectionDiv = document.createElement('div');
    sectionDiv.className = 'journey-section';
    sectionDiv.dataset.tributary = section.tributarySlug;
    sectionDiv.dataset.sectionId = section.id;

    // Process content: wrap images for gallery, remove nav elements, rewrite footnotes,
    // and extract Pannellum init scripts for deferred execution.
    // Use a compound key so each section gets a globally unique gallery class — prevents
    // two sections with the same heading ID (from different tributaries) from sharing a group.
    const sectionKey = section.tributarySlug + '-' + section.id;
    const processed = processContentForCYOA(section.html_content, sectionKey, section.tributaryUrl);
    const processedContent = processed.html;
    const targetLink = processed.targetLink;

    // Determine what the curated button should show
    let curatedButtonImage, curatedButtonLabel, curatedButtonTributary;

    if (targetLink && targetLink.tributarySlug) {
      // Show the TARGET section's heading and tributary icon
      curatedButtonTributary = targetLink.tributarySlug;
      curatedButtonImage = '{{ "/objects/" | relative_url }}' + targetLink.tributarySlug + '.png';

      // Find the target section to get its heading
      if (targetLink.anchorId) {
        const targetSection = allSections.find(s =>
          s.tributarySlug === targetLink.tributarySlug && s.id === targetLink.anchorId
        );
        curatedButtonLabel = targetSection ? targetSection.heading : targetLink.tributarySlug;
      } else {
        // No specific anchor, just show the tributary title
        const targetTrib = tributariesData.tributaries.find(t => t.slug === targetLink.tributarySlug);
        curatedButtonLabel = targetTrib ? targetTrib.title : targetLink.tributarySlug;
      }

      // Store the target link in the section div's dataset for button handler
      sectionDiv.dataset.targetTributary = targetLink.tributarySlug;
      if (targetLink.anchorId) {
        sectionDiv.dataset.targetAnchor = targetLink.anchorId;
      }
    } else {
      // Fallback: show current section's tributary
      curatedButtonTributary = section.tributarySlug;
      curatedButtonLabel = section.tributary;
      curatedButtonImage = '{{ "/objects/" | relative_url }}' + section.tributarySlug + '.png';
    }

    const sectionHTML = `
      <div class="journey-section-header">
        <div class="tributary-badge">${section.tributary}</div>
        <h2 id="${section.id}">${section.heading}</h2>
      </div>
      <div class="journey-section-content spotlight-group">
        ${processedContent}
      </div>
      <div class="journey-section-nav">
        <div class="trib-choice-container">
          <div class="trib-choice-button continue-choice">
            <button class="choice-inner cyoa-randomize" aria-label="Load random section">
              <div class="choice-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" fill="#9B6B6B" viewBox="0 0 16 16">
                  <path fill-rule="evenodd" d="M8 3a5 5 0 1 0 4.546 2.914.5.5 0 0 1 .908-.417A6 6 0 1 1 8 2v1z"/>
                  <path d="M8 4.466V.534a.25.25 0 0 1 .41-.192l2.36 1.966c.12.1.12.284 0 .384L8.41 4.658A.25.25 0 0 1 8 4.466z"/>
                </svg>
              </div>
              <p class="choice-label">Randomize</p>
            </button>
          </div>
          <div class="trib-choice-button branch-choice">
            <button class="choice-inner cyoa-curated" aria-label="Choose specific section">
              <div class="choice-icon">
                <img src="${curatedButtonImage}" class="trib-button-image" alt="${curatedButtonLabel}">
              </div>
              <p class="choice-label">${curatedButtonLabel}</p>
            </button>
          </div>
        </div>
      </div>
    `;

    sectionDiv.innerHTML = sectionHTML;

    // Re-execute any Pannellum panorama init scripts that were extracted from the content.
    // These must run after the container divs are in the live DOM, and require the
    // Pannellum library to be loaded first.
    if (processed.panoramaScripts && processed.panoramaScripts.length > 0) {
      ensurePannellumLoaded().then(function() {
        processed.panoramaScripts.forEach(function(scriptText) {
          const s = document.createElement('script');
          s.textContent = scriptText;
          document.body.appendChild(s);
        });
      });
    }

    // Initially hide content for animation
    if (animate && !prefersReducedMotion) {
      sectionDiv.style.opacity = '0';
    }

    container.appendChild(sectionDiv);

    // Setup button listeners for this section
    setupSectionButtons(sectionDiv);

    // Animate section appearance
    if (animate && !prefersReducedMotion) {
      animateSectionAppearance(sectionDiv);
    } else {
      sectionDiv.style.opacity = '1';
      isLoading = false;
      scrollToSection(sectionDiv);
    }
  }

  /**
   * Load a random section
   */
  function loadRandomSection(animate = true) {
    const section = getRandomSection();
    loadSection(section, animate);
  }

  /**
   * Load a specific section by tributary and section ID
   */
  function loadSpecificSection(tributarySlug, sectionId, animate = true) {
    const section = allSections.find(s =>
      s.tributarySlug === tributarySlug && s.id === sectionId
    );

    if (section) {
      loadSection(section, animate);
    } else {
      console.error(`Section not found: ${tributarySlug}:${sectionId}`);
    }
  }

  /**
   * Setup button event listeners for a section
   */
  function setupSectionButtons(sectionDiv) {
    // Randomize button
    const randomizeBtn = sectionDiv.querySelector('.cyoa-randomize');
    if (randomizeBtn) {
      randomizeBtn.addEventListener('click', () => {
        loadRandomSection(true);
      });
    }

    // Curated section button - check if there's a specific target or show modal
    const curatedBtn = sectionDiv.querySelector('.cyoa-curated');
    if (curatedBtn) {
      curatedBtn.addEventListener('click', () => {
        const targetTributary = sectionDiv.dataset.targetTributary;
        const targetAnchor = sectionDiv.dataset.targetAnchor;

        if (targetTributary && targetAnchor) {
          // Load the specific anchored section directly
          loadSpecificSection(targetTributary, targetAnchor, true);
        } else if (targetTributary) {
          // Load a random section from that tributary
          const tributarySections = allSections.filter(s => s.tributarySlug === targetTributary);
          if (tributarySections.length > 0) {
            const randomSection = tributarySections[Math.floor(Math.random() * tributarySections.length)];
            loadSection(randomSection, true);
          }
        } else {
          // Fallback: show modal to select section from current tributary
          showSectionPicker(sectionDiv.dataset.tributary);
        }
      });
    }
  }

  /**
   * Show section picker modal for curated selection
   */
  function showSectionPicker(currentTributarySlug) {
    // Get all sections from current tributary
    const tributary = tributariesData.tributaries.find(t => t.slug === currentTributarySlug);
    if (!tributary) return;

    // Create modal overlay
    const modal = document.createElement('div');
    modal.className = 'cyoa-section-picker-modal';
    modal.innerHTML = `
      <div class="cyoa-modal-content">
        <div class="cyoa-modal-header">
          <h3>Choose a section from ${tributary.title}</h3>
          <button class="cyoa-modal-close" aria-label="Close">&times;</button>
        </div>
        <div class="cyoa-modal-body">
          ${tributary.sections.map(section => `
            <button class="cyoa-section-option" data-section-id="${section.id}">
              ${section.heading}
            </button>
          `).join('')}
        </div>
      </div>
    `;

    document.body.appendChild(modal);

    // Fade in
    setTimeout(() => modal.classList.add('active'), 10);

    // Close button
    const closeBtn = modal.querySelector('.cyoa-modal-close');
    closeBtn.addEventListener('click', () => {
      modal.classList.remove('active');
      setTimeout(() => modal.remove(), 300);
    });

    // Click outside to close
    modal.addEventListener('click', (e) => {
      if (e.target === modal) {
        modal.classList.remove('active');
        setTimeout(() => modal.remove(), 300);
      }
    });

    // Section selection
    modal.querySelectorAll('.cyoa-section-option').forEach(btn => {
      btn.addEventListener('click', () => {
        const sectionId = btn.dataset.sectionId;
        modal.classList.remove('active');
        setTimeout(() => modal.remove(), 300);
        loadSpecificSection(currentTributarySlug, sectionId, true);
      });
    });
  }

  /**
   * Animate section appearance with sediment particles
   */
  function animateSectionAppearance(sectionDiv) {
    const rect = sectionDiv.getBoundingClientRect();
    const canvas = createAnimationCanvas();
    const ctx = canvas.getContext('2d');

    // Create particles targeting the section area
    const particles = [];
    for (let i = 0; i < ANIMATION_CONFIG.particleCount; i++) {
      const targetX = rect.left + Math.random() * rect.width;
      const targetY = rect.top + Math.random() * rect.height;
      const color = PARTICLE_COLORS[Math.floor(Math.random() * PARTICLE_COLORS.length)];
      const size = ANIMATION_CONFIG.particleSize.min +
                   Math.random() * (ANIMATION_CONFIG.particleSize.max - ANIMATION_CONFIG.particleSize.min);

      particles.push(new SedimentParticle(targetX, targetY, color, size));
    }

    const startTime = Date.now();

    function animate() {
      const elapsed = Date.now() - startTime;
      const progress = Math.min(elapsed / ANIMATION_CONFIG.duration, 1);

      // Clear canvas
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Update and draw particles
      particles.forEach(particle => {
        particle.update(progress);
        particle.draw(ctx);
      });

      // Fade in content as particles settle
      const contentOpacity = Math.max(0, (progress - 0.4) / 0.6);
      sectionDiv.style.opacity = contentOpacity.toString();

      if (progress < 1) {
        requestAnimationFrame(animate);
      } else {
        // Animation complete
        canvas.remove();
        sectionDiv.style.opacity = '1';
        isLoading = false;
        scrollToSection(sectionDiv);
      }
    }

    requestAnimationFrame(animate);
  }

  /**
   * Create canvas for particle animation
   */
  function createAnimationCanvas() {
    let canvas = document.getElementById('cyoa-particle-canvas');

    if (!canvas) {
      canvas = document.createElement('canvas');
      canvas.id = 'cyoa-particle-canvas';
      canvas.style.cssText = `
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 9999;
      `;
      document.body.appendChild(canvas);
    }

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    return canvas;
  }

  /**
   * Smooth scroll to section
   */
  function scrollToSection(sectionDiv) {
    const yOffset = -20;
    const y = sectionDiv.getBoundingClientRect().top + window.pageYOffset + yOffset;

    window.scrollTo({
      top: y,
      behavior: 'smooth'
    });
  }

  /**
   * Show error message
   */
  function showError() {
    const container = document.getElementById('eddies-sections');
    if (container) {
      container.innerHTML = `
        <div class="cyoa-error">
          <p>Unable to load tributary data. Please refresh the page and try again.</p>
        </div>
      `;
    }
  }

  // Initialize when DOM is ready
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }

  // Expose API for debugging
  window.EddiesCYOA = {
    loadRandomSection,
    loadSpecificSection,
    getViewedCount: () => viewedSections.length,
    getTotalCount: () => allSections.length,
    resetProgress: () => {
      viewedSections = [];
      localStorage.removeItem('eddies-viewed-sections');
      console.log('Progress reset');
    }
  };

})();
</script>
