<script>
document.addEventListener('DOMContentLoaded', function() {
  // Guard: prevent observer from overriding active state during click-scroll
  let isClickScrolling = false;

  // Extract all H2 headings from the tributary body
  const h2Elements = document.querySelectorAll('.tributary-body h2');

  if (h2Elements.length === 0) return; // No sections to navigate

  // Get the page title from the H1 or page title
  const pageTitle = document.querySelector('.tributary-body h1')?.textContent.trim() ||
                    document.querySelector('h1')?.textContent.trim() ||
                    document.title.split('|')[0].trim();

  // Create the section navigation menu
  const navMenu = document.createElement('div');
  navMenu.className = 'section-nav-menu';
  navMenu.innerHTML = `<div class="section-nav-title">${pageTitle}</div><ul class="section-nav-list"></ul>`;

  const navList = navMenu.querySelector('.section-nav-list');

  // Generate anchor IDs and menu items for each H2
  h2Elements.forEach((h2, index) => {
    const text = h2.textContent.trim();
    // Create a slug from the heading text
    const slug = text.toLowerCase()
      .replace(/[^\w\s-]/g, '') // Remove special characters
      .replace(/\s+/g, '-')     // Replace spaces with hyphens
      .replace(/-+/g, '-')      // Replace multiple hyphens with single
      .replace(/^-|-$/g, '');   // Remove leading/trailing hyphens

    // Add ID to the H2 element
    h2.id = slug || `section-${index}`;

    // Create menu item
    const li = document.createElement('li');
    const a = document.createElement('a');
    a.href = `#${h2.id}`;
    a.textContent = text;
    a.className = 'section-nav-link';
    a.dataset.section = h2.id;

    li.appendChild(a);
    navList.appendChild(li);
  });

  // Insert the menu into the page
  document.body.appendChild(navMenu);

  // Hide section nav when footer is visible
  const footerEl = document.querySelector('footer');
  if (footerEl) {
    const footerObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        navMenu.classList.toggle('footer-visible', entry.isIntersecting);
      });
    }, { threshold: 0 });
    footerObserver.observe(footerEl);
  }

  // Smooth scroll handler
  document.querySelectorAll('.section-nav-link').forEach(link => {
    link.addEventListener('click', function(e) {
      e.preventDefault();
      const targetId = this.getAttribute('href').substring(1);
      const targetElement = document.getElementById(targetId);

      if (targetElement) {
        // Update URL hash
        history.pushState(null, null, `#${targetId}`);

        // Smooth scroll to target
        targetElement.scrollIntoView({
          behavior: 'smooth',
          block: 'start'
        });

        // Update active state immediately and block observer during scroll
        updateActiveSection(targetId);
        isClickScrolling = true;
        setTimeout(() => { isClickScrolling = false; }, 800);
      }
    });
  });

  // Function to update active section in both menus
  function updateActiveSection(sectionId) {
    // Update fixed left menu
    document.querySelectorAll('.section-nav-link').forEach(link => {
      if (link.dataset.section === sectionId) {
        link.classList.add('active');
      } else {
        link.classList.remove('active');
      }
    });

    // Update full-page nav dropdown sections
    document.querySelectorAll('.section-link').forEach(link => {
      if (link.dataset.section === sectionId) {
        link.classList.add('active');
      } else {
        link.classList.remove('active');
      }
    });
  }

  // Intersection Observer to track which section is in view
  const observerOptions = {
    root: null,
    rootMargin: '-20% 0px -60% 0px', // Trigger when section is in upper portion of viewport
    threshold: 0
  };

  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting && !isClickScrolling) {
        updateActiveSection(entry.target.id);
        // Update URL hash without jumping
        if (history.replaceState) {
          history.replaceState(null, null, `#${entry.target.id}`);
        }
      }
    });
  }, observerOptions);

  // Observe all H2 sections
  h2Elements.forEach(h2 => {
    observer.observe(h2);
  });

  // Handle initial page load with hash
  if (window.location.hash) {
    const initialSection = window.location.hash.substring(1);
    isClickScrolling = true;
    setTimeout(() => {
      const targetElement = document.getElementById(initialSection);
      if (targetElement) {
        targetElement.scrollIntoView({ behavior: 'auto', block: 'start' });
        updateActiveSection(initialSection);
      }
      setTimeout(() => { isClickScrolling = false; }, 800);
    }, 1200);
  } else if (h2Elements.length > 0) {
    // Set first section as active initially
    updateActiveSection(h2Elements[0].id);
  }
});
</script>
